<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <!-- Main login heading -->
    <h1>Login</h1>

    <!-- Local username/password login form -->
    <form method="post" action="/login">
        <!-- Spring Security CSRF token for POST form requests -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Username field for local login -->
        <div>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>
        </div>

        <!-- Password field for local login -->
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
        </div>

        <!-- Submit local login credentials -->
        <button type="submit">Sign In</button>
    </form>

    <hr>

    <!-- Google OAuth2 login starts from this endpoint -->
    <a href="/oauth2/authorization/google">Sign in with Google</a>
</body>
</html>
